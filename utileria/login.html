<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/utileria.css">
</head>
<body>

    <div class="contenedor-formulario text-center">
        <h1 class="fw-bold mb-3">Login</h1>
        <p class="text-muted mb-4">Validación de correo y contraseña usando utilería JS.</p>
        
        <form id="formLogin" class="text-start">
            <div class="mb-3">
                <label for="loginCorreo" class="form-label fw-bold">Correo electrónico:</label>
                <input type="text" id="loginCorreo" class="form-control" placeholder="usuario@correo.com">
            </div>

            <div class="mb-4">
                <label for="loginPassword" class="form-label fw-bold">Contraseña:</label>
                <input type="password" id="loginPassword" class="form-control" placeholder="Ejemplo: Hola123!">
            </div>

            <button type="submit" class="btn btn-dark w-100 py-2 mb-3">Ingresar</button>
        </form>
        
        <a href="index.html" class="d-block text-decoration-underline text-dark fw-bold">Regresar al formulario</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utileria.js"></script>
</body>
</html>
