<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilería JS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/utileria.css">
</head>
<body>

    <div class="contenedor-formulario text-center">
        <h1 class="fw-bold mb-3">Utilería JS</h1>
        <p class="text-muted mb-4">Formulario validado con funciones propias de JavaScript.</p>
        
        <form id="formRegistro" class="text-start">
            <div class="mb-3">
                <label for="nombre" class="form-label fw-bold">Nombre completo:</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ejemplo: Ana Pérez">
            </div>

            <div class="mb-3">
                <label for="correo" class="form-label fw-bold">Correo electrónico:</label>
                <input type="email" id="correo" class="form-control" placeholder="ejemplo@correo.com">
            </div>

            <div class="mb-3">
                <label for="telefono" class="form-label fw-bold">Teléfono:</label>
                <input type="number" id="telefono" class="form-control" placeholder="10 dígitos">
            </div>

            <div class="mb-4">
                <label for="fechaNac" class="form-label fw-bold">Fecha de nacimiento:</label>
                <input type="date" id="fechaNac" class="form-control">
            </div>

            <button type="submit" class="btn btn-dark w-100 py-2 mb-3">Validar formulario</button>
        </form>
        
        <a href="login.html" class="d-block text-decoration-underline text-dark fw-bold">Ir al login</a>
    </div>

    <div class="modal fade" id="modalEdad" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Resultado del Cálculo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="fs-5">Tu edad calculada es: <strong id="txtEdadResultado" class="text-primary">0</strong> años.</p>
                    <div id="alertaMayoria" class="alert mt-2 fw-bold" role="alert"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/utileria.js"></script>
</body>
</html>
